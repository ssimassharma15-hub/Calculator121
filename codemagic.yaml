workflows:
  android-app-build:
    name: Android Calculator Build
    max_build_duration: 15
    instance_type: mac_mini_m1
    scripts:
      - name: Generate Gradle Wrapper & Debug Keystore
        script: |
          gradle wrapper --gradle-version 9.3.1
          chmod +x gradlew
          keytool -genkey -v -noprompt -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
      - name: Build Android APK
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk
      - build/outputs/**/**/*.apk
