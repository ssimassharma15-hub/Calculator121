workflows:
  android-app-build:
    name: Build Android App
    max_build_duration: 15
    instance_type: mac_mini_m1
    scripts:
      - name: Build Android APK
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk
      - build/outputs/**/**/*.apk
