workflows:
  android-calculator-build:
    name: Android Calculator Build
    max_build_duration: 15
    instance_type: mac_mini_m1
    scripts:
      - name: Generate Gradle Wrapper
        script: |
          # Use the pre-installed system gradle tool to generate the project files
          gradle wrapper
          chmod +x gradlew
      - name: Build Android APK
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk
      - build/outputs/**/**/*.apk
