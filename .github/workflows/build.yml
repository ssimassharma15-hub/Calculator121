name: Android APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 9.3.1

    # 1. Google Services ke error ko bypass karne ke liye khali file banana
    - name: Create Mock Google Services JSON
      run: |
        mkdir -p app/src/
        echo '{"project_info": {"project_number": "123", "project_id": "mock-id"}, "client": [{"client_info": {"mobilesdk_app_id": "1:123:android:123", "android_client_info": {"package_name": "mock.package"}}, "api_key": [{"current_key": "mock-key"}], "services": {}}]}' > app/google-services.json

    # 2. Missing Keystore ke error ko theek karne ke liye temporary key banana
    - name: Generate Temporary Debug Keystore
      run: keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-calculator-apk
        path: app/build/outputs/apk/debug/*.apk
